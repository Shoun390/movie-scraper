<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shawonflix - Premium Stream</title>
<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }

#loader {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px; background: #000; z-index: 99;
}
#loader-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: opacity .6s ease; opacity: 0;
}
.spinner {
  position: relative; z-index: 1;
  width: 72px; height: 72px;
  border: 5px solid rgba(255,255,255,.15);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader-text { position: relative; z-index: 1; font-size: .95rem; color: rgba(255,255,255,.6); letter-spacing: .04em; text-shadow: 0 1px 4px #000; }

/* Player Container */
#player-container { position: fixed; inset: 0; display: none; background: #000; }

#usage, #err {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; background: #000; gap: 10px;
}
#err-title { font-size: 2.4rem; font-weight: 700; color: #fff; margin-bottom: 18px; }
#err-link { font-size: 1.1rem; color: #60a5fa; text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p>
    <span style="color:#fff;font-size:1.2rem">Shawonflix Player</span><br><br>
    <code>?id=TMDB_ID</code><br>
    <code>?id=TMDB_ID&s=1&e=1</code>
  </p>
</div>

<div id="err">
  <div id="err-title">Error Occurred</div>
  <a id="err-link" href="#">Try Alternative?</a>
  <div id="err-detail" style="margin-top:20px; color:gray;"></div>
</div>

<div id="player-container"></div>

<script>
var TMDB_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';
var msgEl = document.getElementById('loader-text');
var MESSAGES = ['Loading stream...', 'Bribing the servers...', 'Decoding the matrix...', 'Almost there...'];
var msgIdx = 0;
var msgTimer = setInterval(() => {
  msgIdx = (msgIdx + 1) % MESSAGES.length;
  msgEl.textContent = MESSAGES[msgIdx];
}, 2200);

var p = new URLSearchParams(location.search);
var id = p.get('id'), s = p.get('s'), e = p.get('e');

function showErr(msg) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg || '';
}

// Backdrop loader logic same rakhlam
if (id) {
  fetch(`https://api.themoviedb.org/3/${s?'tv':'movie'}/${id}?api_key=${TMDB_KEY}`)
    .then(r => r.json()).then(d => {
      var img = d.backdrop_path || d.poster_path;
      if (img) {
        var url = `https://wsrv.nl/?url=https://image.tmdb.org/t/p/w1280${img}&bg=black&blur=3`;
        var bg = document.getElementById('loader-bg');
        bg.style.backgroundImage = `url(${url})`;
        bg.style.opacity = '1';
      }
    });

  // API Call to your scraper
  var apiPath = `/api?id=${id}${s ? `&s=${s}&e=${e||1}` : ''}`;
  fetch(apiPath)
    .then(r => r.json())
    .then(d => {
      if (d.error) return showErr(d.error);
      initArtPlayer(d.url);
    })
    .catch(err => showErr(err.message));
} else {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
}

function initArtPlayer(rawUrl) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('player-container').style.display = 'block';

  // Rewritten Proxy URL for M3U8
  var finalUrl = `/api?url=${encodeURIComponent(rawUrl)}`;

  var art = new ArtPlayer({
    container: '#player-container',
    url: finalUrl,
    type: 'm3u8',
    autoplay: true,
    fullscreen: true,
    fullscreenWeb: true,
    setting: true,
    pip: true,
    playbackRate: true,
    aspectRatio: true,
    autoSize: true,
    fastForward: true,
    lock: true,
    customType: {
      m3u8: function(video, url) {
        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(url);
          hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
        }
      },
    },
  });
}
</script>
</body>
</html>
