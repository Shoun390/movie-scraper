<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/artplayer/5.1.1/artplayer.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/artplayer/5.1.1/artplayer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:system-ui;
color:#fff;
}

/* Loader */
#loader{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
background:#000;
transition:opacity .3s ease;
}

.spinner{
width:70px;
height:70px;
border:4px solid rgba(255,255,255,.15);
border-top-color:#fff;
border-radius:50%;
animation:spin .9s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}

/* Player */
#player{
position:fixed;
inset:0;
display:none;
}

#artplayer,.art-video-player{
width:100vw!important;
height:100vh!important;
background:#000!important;
}

/* Error */
#error{
position:fixed;
inset:0;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
background:#000;
text-align:center;
}

#error h1{
font-size:2rem;
margin-bottom:10px;
}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
<div id="msg">Loading stream...</div>
</div>

<div id="player">
<div id="artplayer"></div>
</div>

<div id="error">
<h1>Error</h1>
<p id="errMsg"></p>
</div>

<script>

var BASE = 'https://cineprocore-2.onrender.com';

var p = new URLSearchParams(location.search);

var id = p.get('id');

var type = p.get('type') || 'movies';

var loader = document.getElementById('loader');

var msg = document.getElementById('msg');

var player = document.getElementById('player');

var err = document.getElementById('error');

var errMsg = document.getElementById('errMsg');

function showError(t){
loader.style.display='none';
err.style.display='flex';
errMsg.innerText=t||'Something went wrong';
}

async function load(){

if(!id){
showError('NO ID PROVIDED');
return;
}

try{

msg.innerText='Fetching stream...';

const res = await fetch(BASE+'/v1/'+type+'/'+id,{cache:'force-cache'});

if(!res.ok){
showError('CONTENT NOT FOUND');
return;
}

const data = await res.json();

const fix = u => u.replace(/http:\/\/localhost:10000/g,BASE);

const url = fix(data.sources[0].url);

play(url);

}catch(e){
showError('SERVER ERROR / RETRYING');
setTimeout(load,2500);
}

}

function play(rawUrl){

var secureUrl = '/api?url=' + encodeURIComponent(rawUrl) + '&t=' + btoa(Date.now());

new Artplayer({

container:'#artplayer',

url:secureUrl,

type:'m3u8',

autoplay:true,
autoSize:false,
autoMini:true,
fullscreen:true,
fullscreenWeb:true,
pip:true,
setting:true,
hotkey:true,
airplay:true,
playbackRate:true,
aspectRatio:true,
subtitleOffset:true,
miniProgressBar:true,
mutex:true,
fastForward:true,
lock:true,
flip:true,
volume:1,
theme:'#ffffff',

moreVideoAttr:{
crossOrigin:'anonymous',
playsInline:true,
preload:'auto'
},

customType:{

m3u8:function(video,url){

if(Hls.isSupported()){

const hls = new Hls({

enableWorker:true,
lowLatencyMode:true,
backBufferLength:20,
maxBufferLength:60,
fragLoadingTimeOut:8000,
manifestLoadingTimeOut:8000,
levelLoadingTimeOut:8000
});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

loader.style.opacity='0';

setTimeout(()=>loader.style.display='none',300);

player.style.display='block';

video.muted=true;

video.play().then(()=>{

video.muted=false;

}).catch(()=>{});

});

hls.on(Hls.Events.ERROR,function(_,data){

if(data.fatal){
showError('STREAM ERROR - RELOADING');
hls.destroy();
setTimeout(load,2000);
}

});

}else{

video.src=url;

video.onloadedmetadata=function(){

loader.style.display='none';
player.style.display='block';

video.play().catch(()=>{});

};

}

}

}

});

}

load();

</script>

</body>
</html>
