<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shawonflix - Pro Player</title>
<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
    #player { width: 100%; height: 100vh; display: none; }
    #status { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; text-align: center; z-index: 10; }
    .loader { border: 4px solid #333; border-top: 4px solid #ff0000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="status">
    <div>
        <div class="loader" style="margin: 0 auto 15px;"></div>
        <div id="status-text">Connecting to Shawonflix Server...</div>
    </div>
</div>

<div id="player"></div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');
const s = urlParams.get('s');
const e = urlParams.get('e');
const statusText = document.getElementById('status-text');

async function startEngine() {
    if (!id) {
        statusText.innerHTML = "Error: ID missing!<br>Use ?id=550";
        return;
    }

    try {
        // Step 1: Scraper theke link ana
        // Amra relative path use korchi jeno Render/Vercel e shubidha hoy
        const response = await fetch(`./api?id=${id}${s ? `&s=${s}&e=${e||1}` : ''}`);
        
        if (!response.ok) throw new Error("Server Response Not OK");
        
        const data = await response.json();
        
        if (data.url) {
            statusText.innerText = "Stream Found! Initializing Player...";
            initArtPlayer(data.url);
        } else {
            throw new Error("Link Not Found in Database");
        }
    } catch (err) {
        console.error(err);
        statusText.innerHTML = `<span style="color:#ff4444">Failed to fetch data.</span><br><small>${err.message}</small>`;
    }
}

function initArtPlayer(videoUrl) {
    // CORS bypass korar jonno amra amader scraper proxy-tei pathabo
    const finalStreamUrl = `./api?url=${encodeURIComponent(videoUrl)}`;

    const art = new ArtPlayer({
        container: '#player',
        url: finalStreamUrl,
        type: 'm3u8',
        autoplay: true,
        autoSize: true,
        fullscreen: true,
        setting: true,
        pip: true,
        theme: '#ff0000',
        customType: {
            m3u8: function(video, url) {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                }
            },
        },
    });

    art.on('ready', () => {
        document.getElementById('status').style.display = 'none';
        document.getElementById('player').style.display = 'block';
    });
    
    art.on('error', () => {
        statusText.innerText = "ArtPlayer Error: Cannot Play Stream.";
        document.getElementById('status').style.display = 'flex';
    });
}

startEngine();
</script>
</body>
</html>
