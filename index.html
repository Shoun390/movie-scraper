<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }

#loader {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px; background: #000;
  z-index: 999;
}
#loader-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: opacity .6s ease; opacity: 0;
}
.spinner {
  position: relative; z-index: 1;
  width: 72px; height: 72px;
  border: 5px solid rgba(255,255,255,.15);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader-text { position: relative; z-index: 1; font-size: .95rem; color: rgba(255,255,255,.6); letter-spacing: .04em; text-shadow: 0 1px 4px #000; }

/* Video.js Customization to fill screen */
#player { position: fixed; inset: 0; display: none; background: #000; }
.video-js { width: 100% !important; height: 100% !important; }
.vjs-theme-city .vjs-big-play-button { border: none; background-color: #ff0000; }

#usage, #err {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  background: #000; gap: 10px;
}
#err-title { font-size: 2.4rem; font-weight: 700; color: #fff; margin-bottom: 18px; }
#err-link { font-size: 1.1rem; color: #60a5fa; text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p><span style="color:#fff;font-size:1.2rem">Stream</span><br><br><code>?id=550</code></p>
</div>

<div id="err">
  <div id="err-title">Error Occurred</div>
  <a id="err-link" href="#">Try vidsrc.xyz instead?</a>
  <div id="err-detail" style="font-size: .78rem; color: rgba(255,255,255,.35); margin-top: 20px;"></div>
</div>

<div id="player">
  <video id="v" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
</div>

<script>
var TMDB_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';
var MESSAGES = ['Loading stream...', 'Bribing the servers...', 'Decoding the matrix...', 'Almost there...'];
var msgEl = document.getElementById('loader-text'), msgIdx = 0;
var msgTimer = setInterval(() => { msgIdx = (msgIdx + 1) % MESSAGES.length; msgEl.textContent = MESSAGES[msgIdx]; }, 2200);

var p = new URLSearchParams(location.search);
var id = p.get('id'), s = p.get('s'), e = p.get('e');

function showPlayer() {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('player').style.display = 'block';
}

function showErr(msg) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg || '';
  var vidsrcUrl = s ? `https://vidsrc.xyz/embed/tv?tmdb=${id}&season=${s}&episode=${e||1}` : `https://vidsrc.xyz/embed/movie?tmdb=${id}`;
  document.getElementById('err-link').href = vidsrcUrl;
}

function loadBackdrop(id, isTv) {
  fetch(`https://api.themoviedb.org/3/${isTv?'tv':'movie'}/${id}?api_key=${TMDB_KEY}`)
    .then(r => r.json()).then(d => {
      var img = d.backdrop_path || d.poster_path;
      if (!img) return;
      var url = `https://wsrv.nl/?url=${encodeURIComponent('https://image.tmdb.org/t/p/w1280' + img)}&bg=black&blur=3`;
      var bg = document.getElementById('loader-bg');
      var preload = new Image();
      preload.onload = () => { bg.style.backgroundImage = `url(${url})`; bg.style.opacity = '1'; };
      preload.src = url;
    }).catch(() => {});
}

if (!id) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
} else {
  loadBackdrop(id, !!s);
  fetch(`/api?${s ? `id=${id}&s=${s}&e=${e||1}` : `id=${id}`}`)
    .then(r => r.json()).then(d => {
      if (d.error) return showErr(d.error);
      play(d.url);
    }).catch(err => showErr(err.message));
}

function play(rawUrl) {
  var src = '/api?url=' + encodeURIComponent(rawUrl);
  var videoPlayer = videojs('v', {
    fluid: true,
    autoplay: true,
    playbackRates: [0.5, 1, 1.5, 2]
  });

  videoPlayer.src({ src: src, type: 'application/x-mpegURL' });

  videoPlayer.on('ready', () => {
    showPlayer();
    videoPlayer.play().catch(() => {});
  });

  videoPlayer.on('error', () => {
    showErr("Video.js could not load the stream.");
  });
}
</script>
</body>
</html>
