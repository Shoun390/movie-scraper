<script>
function play(rawUrl) {
  var src = '/api?url=' + encodeURIComponent(rawUrl);
  var video = document.getElementById('v');

  // Remove old controls attribute for ArtPlayer
  video.removeAttribute('controls');

  // Create ArtPlayer container
  var artContainer = document.createElement('div');
  artContainer.id = 'artplayer';
  artContainer.style.width = '100vw';
  artContainer.style.height = '100vh';

  document.getElementById('player').innerHTML = '';
  document.getElementById('player').appendChild(artContainer);

  function startPlayer(videoUrl) {
    new Artplayer({
      container: artContainer,
      url: videoUrl,
      autoplay: true,
      fullscreen: true,
      autoSize: true,
      airplay: true,
      playsInline: true,
      setting: true,
      hotkey: true,
      pip: true,
      screenshot: true,
      playbackRate: true,
      aspectRatio: true,
      mutex: true,
      theme: '#ffffff',
      controls: [
        {
          position: 'right',
          html: '1080P',
          tooltip: 'Quality',
        }
      ],
      customType: {
        m3u8: function(video, url) {
          if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function () {
              showPlayer();
              video.play().catch(function(){});
            });

            hls.on(Hls.Events.ERROR, function (_, d) {
              if (d.fatal) showErr(d.details);
            });
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;

            video.addEventListener('canplay', function () {
              showPlayer();
              video.play().catch(function(){});
            }, { once: true });
          }
        }
      }
    });
  }

  startPlayer(src);
}
</script>
